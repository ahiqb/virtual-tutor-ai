<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Virtual Tutor AI</title>
<style>
body{background:#f4f4f4;font-family:Segoe UI;}
.container{height:100vh;display:flex;justify-content:center;align-items:center;}
.card{background:#fff;width:420px;padding:40px;border-radius:10px;box-shadow:0 0 10px #ccc;}
input,select,button{width:100%;padding:12px;margin-bottom:15px;}
button{background:#28a745;color:#fff;border:none;border-radius:5px;}
.message{color:red;text-align:center;margin-bottom:15px;}
</style>
</head>

<body>
<div class="container">
<div class="card">
<h2 align="center">Register</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, msg in messages %}
<p class="message">{{ msg }}</p>
{% endfor %}
{% endwith %}

<form method="POST">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<select name="role" required>
<option value="">Select Role</option>
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button type="submit">Register</button>
</form>

</div>
</div>
</body>
</html>
