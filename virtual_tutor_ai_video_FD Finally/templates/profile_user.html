<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Virtual Tutor AI Video</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh; }
        .container { background:white; padding:30px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); width:400px; }
        h1 { color:#333; text-align:center; margin-bottom:20px; }
        input, button { width:100%; padding:12px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
        button { background:#007bff; color:white; border:none; cursor:pointer; font-weight:600; transition:0.3s; }
        button:hover { background:#0056b3; }
        .message { text-align:center; padding:10px; border-radius:5px; margin-bottom:15px; }
        .success { background-color:#d4edda; color:#155724; border:1px solid #c3e6cb; }
        .error { background-color:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
        .back-btn { text-align:center; margin-top:15px; }
        .back-btn a { text-decoration:none; color:#007bff; font-weight:600; }
        .back-btn a:hover { color:#0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Profile</h1>

    <!-- Flash Notifications -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <p class="message {{ category }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="" method="POST">
        <input type="text" name="name" value="{{ user.name }}" placeholder="Full Name" required>
        <input type="email" name="email" value="{{ user.email }}" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="New Password" required>
        <button type="submit">Update Profile</button>
    </form>

    <div class="back-btn">
        <a href="/dashboard_user">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
