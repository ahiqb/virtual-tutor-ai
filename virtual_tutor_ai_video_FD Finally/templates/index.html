<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Tutor AI Video</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 420px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 26px;
            color: #333;
            font-weight: 600;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            font-weight: 600;
        }

        .login-btn {
            background: #007bff;
            color: white;
        }

        .login-btn:hover {
            background: #0056b3;
        }

        .register-btn {
            background: #28a745;
            color: white;
        }

        .register-btn:hover {
            background: #1e7e34;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Virtual Tutor AI Video</h1>
        <p>Your AI-powered video tutor with real-time interaction</p>

        <a href="/login">
            <button class="btn login-btn">Login</button>
        </a>

        <a href="/register">
            <button class="btn register-btn">Register</button>
        </a>
    </div>
</div>

</body>
</html>
