<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin:0; padding:0; background:#f4f4f4; }
        .container { margin:50px auto; width:400px; background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px #ccc; }
        h2 { text-align:center; margin-bottom:20px; color:#333; }
        input, button { width:100%; padding:12px; margin:10px 0; border-radius:5px; border:1px solid #ccc; font-size:14px; }
        button { background-color:#007bff; color:white; border:none; cursor:pointer; font-weight:600; transition:0.3s; }
        button:hover { background-color:#0056b3; }
        .back-btn { text-align:center; margin-top:10px; }
        .back-btn a { text-decoration:none; color:#007bff; }
        .back-btn a:hover { color:#0056b3; }
        .message { text-align:center; padding:10px; border-radius:5px; margin-bottom:15px; }
        .success { background-color:#d4edda; color:#155724; border:1px solid #c3e6cb; }
        .error { background-color:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit User</h2>

    <!-- Flash Notifications -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <p class="message {{ category }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="" method="POST">
        <input type="text" name="name" value="{{ user.name }}" placeholder="Full Name" required>
        <input type="email" name="email" value="{{ user.email }}" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="New Password" required>
        <button type="submit">Update User</button>
    </form>

    <div class="back-btn">
        <a href="/manage_users">Back to Manage Users</a>
    </div>
</div>

</body>
</html>
